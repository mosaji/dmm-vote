<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DMM 콘텐츠 투표</title>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>
</head>
<body style="margin:0;padding:20px;background:#f8f8f8;font-family:'Apple SD Gothic Neo','Noto Sans KR',sans-serif;display:flex;justify-content:center;">
<div style="background:#fff;border-radius:16px;padding:32px 28px 28px;max-width:480px;width:100%;box-shadow:0 4px 20px rgba(0,0,0,0.08);border:1px solid #f0f0f0;">
  
  <div id="voteForm">
    <span style="display:inline-block;background:#FF3B3B;color:#fff;font-size:11px;font-weight:700;padding:3px 10px;border-radius:20px;margin-bottom:12px;">📊 지금 투표하기</span>
    <div style="font-size:18px;font-weight:800;color:#111;line-height:1.4;margin-bottom:6px;">DMM 에서 주로 이용하는 콘텐츠 또는<br>이용해 보고 싶은 콘텐츠는?</div>
    
    <div style="margin: 20px 0;">
      <label style="font-size:13px; font-weight:700; color:#444;">네이버 아이디</label>
      <input type="text" id="naverId" placeholder="아이디를 입력해주세요" style="width:100%;padding:12px;margin-top:5px;border:2px solid #ebebeb;border-radius:8px;font-size:14px;box-sizing:border-box; outline:none; transition:0.2s;">
    </div>

    <div id="optionsList" style="display:flex;flex-direction:column;gap:10px;margin-bottom:16px;"></div>
    <button onclick="submitVote()" style="width:100%;padding:14px;background:linear-gradient(135deg,#e74c3c 0%,#c0392b 100%);color:#fff;border:none;border-radius:10px;font-size:15px;font-weight:700;cursor:pointer;margin-top:10px;">✔ 투표하기</button>
  </div>

  <div id="resultView" style="display:none;">
    <span style="display:inline-block;background:#FF3B3B;color:#fff;font-size:11px;font-weight:700;padding:3px 10px;border-radius:20px;margin-bottom:12px;">📊 RESULT</span>
    <div id="resultBars"></div>
    <div id="totalCount" style="text-align:center;font-size:12px;color:#bbb;margin-top:16px;"></div>
    <button onclick="resetVote()" style="width:100%;padding:12px;background:#f0f0f0;color:#666;border:none;border-radius:10px;font-size:13px;font-weight:600;cursor:pointer;margin-top:20px;">↺ 다시 투표하기</button>
  </div>
</div>

<script>
const firebaseConfig = {
    apiKey: "AIzaSyDwDWQPFvfeT1oOXxLvza00SB4GaKAmKWI",
    authDomain: "dmm-260406.firebaseapp.com",
    databaseURL: "https://dmm-260406-default-rtdb.asia-southeast1.firebasedatabase.app",
    projectId: "dmm-260406",
    storageBucket: "dmm-260406.firebasestorage.app",
    messagingSenderId: "274127728428",
    appId: "1:274127728428:web:2849db06b4242975f10689"
};
firebase.initializeApp(firebaseConfig);
const db = firebase.database();

const OPTS = [
    {v:'dmmtv_anime', l:'✨ DMM TV (애니메이션)'},
    {v:'dmmtv_drama', l:'📺 DMM TV (드라마·영화)'},
    {v:'game', l:'🎮 DMM GAMES (게임)'},
    {v:'books', l:'📚 DMM BOOKS (만화)'},
    {v:'oripa', l:'🎁 D오리파 (오리지널 카드팩)'},
    {v:'fanza', l:'🔞 FANZA (성인 콘텐츠)'}
];

function renderOptions() {
    const listEl = document.getElementById('optionsList');
    listEl.innerHTML = "";
    OPTS.forEach((o, i) => {
        const id = 'opt' + i;
        listEl.innerHTML += `
            <div onclick="selectOpt('${o.v}', '${id}')" style="cursor:pointer;">
                <label id="lbl_${id}" style="display:flex;align-items:center;gap:12px;padding:15px;border:2px solid #ebebeb;border-radius:10px;cursor:pointer;background:#fafafa;font-size:14px;color:#333;font-weight:600;transition:0.2s;">
                  <span>${o.l}</span>
                </label>
            </div>`;
    });
}

let selectedVal = "";
function selectOpt(v, id) {
    selectedVal = v;
    document.querySelectorAll('[id^="lbl_"]').forEach(el => {
        el.style.border = "2px solid #ebebeb";
        el.style.background = "#fafafa";
    });
    document.getElementById('lbl_'+id).style.border = "2px solid #e74c3c";
    document.getElementById('lbl_'+id).style.background = "#fff5f5";
}

function submitVote() {
    const naverId = document.getElementById('naverId').value.trim();
    if(!naverId) return alert("네이버 아이디를 입력해 주세요!");
    if(!selectedVal) return alert("투표 항목을 선택해 주세요!");

    // 아이디 수집 및 카운트 증가
    db.ref('user_votes/' + naverId).once('value', (s) => {
        if(s.exists()) {
            alert("이미 투표에 참여한 아이디입니다.");
        } else {
            // 1. 개별 유저 투표 기록 저장
            db.ref('user_votes/' + naverId).set({
                choice: selectedVal,
                timestamp: Date.now()
            });
            // 2. 전체 통계 카운트 증가
            db.ref('votes_stats/' + selectedVal).transaction(c => (c || 0) + 1);
            
            localStorage.setItem("dmm_voted_id", "true");
            showResults();
        }
    });
}

function showResults() {
    db.ref('votes_stats').on('value', (snap) => {
        const data = snap.val() || {};
        const total = Object.values(data).reduce((a, b) => a + b, 0) || 0;
        let html = "";
        OPTS.forEach(o => {
            const cnt = data[o.v] || 0;
            const pct = total ? Math.round((cnt/total)*100) : 0;
            html += `<div style="margin-bottom:12px;">
                <div style="display:flex;justify-content:space-between;font-size:13px;margin-bottom:5px;"><span>${o.l}</span><span>${pct}% (${cnt}명)</span></div>
                <div style="height:8px;background:#f0f0f0;border-radius:10px;overflow:hidden;">
                <div style="width:${pct}%;height:100%;background:#e74c3c;transition:0.5s;"></div></div></div>`;
        });
        document.getElementById("resultBars").innerHTML = html;
        document.getElementById("totalCount").textContent = "총 " + total + "명 참여";
        document.getElementById("voteForm").style.display = "none";
        document.getElementById("resultView").style.display = "block";
    });
}

function resetVote() {
    localStorage.removeItem("dmm_voted_id");
    location.reload();
}

renderOptions();
if(localStorage.getItem("dmm_voted_id")) showResults();
</script>
</body>
</html>
