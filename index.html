<!DOCTYPE html>
<html lang="ko">
<head>

</head>
<body style="margin:0;padding:20px;background:#f8f8f8;font-family:'Apple SD Gothic Neo','Noto Sans KR',sans-serif;display:flex;justify-content:center;">
<div style="background:#fff;border-radius:16px;padding:32px 28px 28px;max-width:480px;width:100%;box-shadow:0 4px 20px rgba(0,0,0,0.08);border:1px solid #f0f0f0;">
  <div id="voteForm">
    <span style="display:inline-block;background:#FF3B3B;color:#fff;font-size:11px;font-weight:700;padding:3px 10px;border-radius:20px;margin-bottom:12px;">📊 지금 투표하기</span>
    <div style="font-size:18px;font-weight:800;color:#111;line-height:1.4;margin-bottom:6px;">당신이 DMM에서<br>주로 이용하는 콘텐츠는?</div>
    <div style="font-size:13px;color:#888;margin-bottom:22px;">재팬플레이 내부 업무참고용으로만 사용됩니다.</div>
    <div id="optionsList" style="display:flex;flex-direction:column;gap:10px;margin-bottom:16px;"></div>
    <div id="etcInputWrap" style="display:none;margin-bottom:12px;">
      <input type="text" id="etcText" maxlength="40" placeholder="어떤 서비스인지 간단히 적어주세요" style="width:100%;padding:10px 14px;border:2px solid #e74c3c;border-radius:8px;font-size:13px;box-sizing:border-box;">
    </div>
    <button onclick="submitVote()" style="width:100%;padding:14px;background:linear-gradient(135deg,#e74c3c 0%,#c0392b 100%);color:#fff;border:none;border-radius:10px;font-size:15px;font-weight:700;cursor:pointer;">✔ 투표하기</button>
  </div>
  <div id="resultView" style="display:none;">
    <span style="display:inline-block;background:#FF3B3B;color:#fff;font-size:11px;font-weight:700;padding:3px 10px;border-radius:20px;margin-bottom:12px;">📊 RESULT</span>
    <div id="resultBars"></div>
    <div id="totalCount" style="text-align:center;font-size:12px;color:#bbb;margin-top:16px;"></div>
  </div>
</div>
<script>
const firebaseConfig = {
    apiKey: "AIzaSyDwDWQPFvfeT1oOXxLvza00SB4GaKAmKWI",
    authDomain: "dmm-260406.firebaseapp.com",
    databaseURL: "https://dmm-260406-default-rtdb.asia-southeast1.firebasedatabase.app",
    projectId: "dmm-260406",
    storageBucket: "dmm-260406.firebasestorage.app",
    messagingSenderId: "274127728428",
    appId: "1:274127728428:web:2849db06b4242975f10689"
};
firebase.initializeApp(firebaseConfig);
const db = firebase.database().ref("votes");
const OPTS = [
    {id:'opt1', v:'dmmtv_anime', l:'✨ DMM TV (애니메이션)', s:'최신 방영작·구작 애니 스트리밍'},
    {id:'opt2', v:'dmmtv_drama', l:'📺 DMM TV (드라마·영화)', s:'일본 드라마·영화·예능 스트리밍'},
    {id:'opt3', v:'game', l:'🎮 DMM GAMES (게임)', s:'PC·브라우저 게임'},
    {id:'opt4', v:'books', l:'📚 DMM BOOKS (만화)', s:'일본 만화·라노베 전자책'},
    {id:'opt5', v:'fanza', l:'🔞 FANZA (성인 콘텐츠)', s:'R18 동영상·만화·게임'},
    {id:'opt6', v:'etc', l:'💡 기타 (그 외 항목)', s:'위 항목에 없는 DMM 서비스'}
];
const listEl = document.getElementById('optionsList');
OPTS.forEach(o => {
    listEl.innerHTML += `<div onclick="selectOpt('${o.v}')">
        <input type="radio" name="dmm_content" id="${o.id}" value="${o.v}" style="display:none;">
        <label for="${o.id}" id="lbl_${o.v}" style="display:flex;align-items:center;gap:12px;padding:13px 16px;border:2px solid #ebebeb;border-radius:10px;cursor:pointer;background:#fafafa;font-size:14px;color:#333;font-weight:500;transition:0.2s;">
          <span style="width:32px;height:32px;border-radius:8px;background:#f0f0f0;display:inline-flex;align-items:center;justify-content:center;font-size:16px;flex-shrink:0;">${o.l.split(' ')[0]}</span>
          <span style="flex:1;line-height:1.3;">${o.l.substring(3)}<span style="display:block;font-size:11px;color:#aaa;font-weight:400;margin-top:2px;">${o.s}</span></span>
        </label>
    </div>`;
});
function selectOpt(val) {
    OPTS.forEach(o => {
        const isChecked = o.v === val;
        const lbl = document.getElementById('lbl_'+o.v);
        lbl.style.border = isChecked ? "2px solid #e74c3c" : "2px solid #ebebeb";
        lbl.style.background = isChecked ? "#fff5f5" : "#fafafa";
    });
    document.getElementById("etcInputWrap").style.display = (val === "etc" ? "block" : "none");
    window.selectedVal = val;
}
function submitVote() {
    if(!window.selectedVal) return alert("항목을 선택해 주세요!");
    db.child(window.selectedVal).transaction(c => (c || 0) + 1);
    localStorage.setItem("dmm_voted", "1");
    loadResults();
}
